version: "3.8"
services:
  app:
    build: . 
    ports:
      - "3000:3000" 
    environment : 
           DB_HOST: db
           DB_USER: root
           DB_PASSWORD: root123 
    depends_on:
      db:
        condition: service_healthy    
  db:
    image: mysql:8.0
    environment:
           MYSQL_ROOT_PASSWORD: root123
           MYSQL_DATABASE: ivolve
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
           test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
           interval: 5s
           timeout: 3s
           retries: 10

volumes:
    db_data:         
